<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHATTR — Room</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --surface2: #161616;
      --border: #1e1e1e;
      --accent: #e8ff3e;
      --accent2: #ff4e3a;
      --text: #f0f0f0;
      --muted: #444;
      --muted2: #666;
      --bubble-me: #1a1f0a;
      --bubble-them: #141414;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,62,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,62,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ─────────────────────────────── */
    header {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent 60%);
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.3rem;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .online-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      color: var(--muted2);
      letter-spacing: 0.08em;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: #3dff87; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    #user-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #user-avatar:hover { border-color: var(--accent); }

    #logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted2);
      padding: 5px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: all 0.15s;
    }
    #logout-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    /* ── Messages ────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-wrapper {
      display: flex;
      padding: 4px 24px;
      gap: 10px;
      animation: fadeIn 0.25s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-wrapper.me { flex-direction: row-reverse; }

    .avatar-small {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      margin-top: 2px;
      border: 1px solid var(--border);
    }

    .bubble-group { max-width: 65%; display: flex; flex-direction: column; gap: 2px; }
    .message-wrapper.me .bubble-group { align-items: flex-end; }

    .sender-name {
      font-size: 0.62rem;
      color: var(--muted2);
      letter-spacing: 0.06em;
      margin-bottom: 3px;
      padding: 0 2px;
    }

    .bubble {
      background: var(--bubble-them);
      border: 1px solid var(--border);
      padding: 10px 14px;
      font-size: 0.82rem;
      line-height: 1.55;
      color: var(--text);
      word-break: break-word;
      position: relative;
    }

    .message-wrapper.me .bubble {
      background: var(--bubble-me);
      border-color: rgba(232,255,62,0.15);
    }

    .timestamp {
      font-size: 0.58rem;
      color: var(--muted);
      padding: 0 2px;
      margin-top: 2px;
    }

    /* System messages */
    .sys-msg {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      padding: 8px 24px;
      text-transform: uppercase;
    }

    /* ── Input Area ──────────────────────────── */
    #input-area {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-right: none;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      height: 50px;
      line-height: 1.5;
    }

    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }

    #send-btn {
      height: 50px;
      padding: 0 22px;
      background: var(--accent);
      border: none;
      color: #0a0a0a;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #fff; }
    #send-btn:active { transform: scale(0.97); }

    /* Typing indicator */
    #typing-indicator {
      padding: 0 24px 8px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      min-height: 22px;
      z-index: 1;
      position: relative;
    }

    /* Reconnect banner */
    #reconnect-banner {
      display: none;
      background: var(--accent2);
      color: #fff;
      text-align: center;
      padding: 8px;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div id="reconnect-banner">⚠ Disconnected — reconnecting...</div>

  <header>
    <div class="logo">CHATTR<span>.</span></div>
    <div class="header-right">
      <div class="online-badge">
        <div class="dot"></div>
        <span id="online-count">— online</span>
      </div>
      <img id="user-avatar" src="" alt="You" />
      <button id="logout-btn">Sign out</button>
    </div>
  </header>

  <div id="messages"></div>
  <div id="typing-indicator"></div>

  <div id="input-area">
    <input id="msg-input" type="text" placeholder="Type a message..." autocomplete="off" maxlength="500" />
    <button id="send-btn">Send →</button>
  </div>

  <!-- Socket.io client — point to your Render backend -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, orderBy, limit, getDocs, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔧 REPLACE with your Firebase config (same as index.html)
   const firebaseConfig = {
  
};

    // 🔧 REPLACE with your Render.com backend URL
    const BACKEND_URL = "https://chattr-wrl9.onrender.com";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let socket = null;
    let typingTimeout = null;
    const typingUsers = new Set();

    // ── Auth guard ────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "index.html"; return; }
      currentUser = user;
      document.getElementById("user-avatar").src = user.photoURL || "";

      await loadHistory();
      connectSocket();
    });

    // ── Load message history from Firestore ───
    async function loadHistory() {
      const q = query(collection(db, "messages"), orderBy("timestamp", "asc"), limit(50));
      const snap = await getDocs(q);
      snap.forEach(doc => renderMessage(doc.data(), false));
      scrollToBottom();
      addSysMsg("— previous messages —");
    }

    // ── Socket.io ─────────────────────────────
    function connectSocket() {
      socket = io(BACKEND_URL, { transports: ["websocket"] });

      socket.on("connect", () => {
        document.getElementById("reconnect-banner").style.display = "none";
        socket.emit("join", {
          uid: currentUser.uid,
          name: currentUser.displayName,
          photo: currentUser.photoURL
        });
      });

      socket.on("disconnect", () => {
        document.getElementById("reconnect-banner").style.display = "block";
      });

      socket.on("online_count", (count) => {
        document.getElementById("online-count").textContent = `${count} online`;
      });

      socket.on("receive_message", (data) => {
        renderMessage(data, true);
        scrollToBottom();
      });

      socket.on("user_typing", ({ name, uid }) => {
        if (uid === currentUser.uid) return;
        typingUsers.add(name);
        updateTypingIndicator();
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
          typingUsers.delete(name);
          updateTypingIndicator();
        }, 2500);
      });
    }

    // ── Render a single message ────────────────
    function renderMessage(data, animate) {
      const isMe = data.uid === currentUser.uid;
      const wrapper = document.createElement("div");
      wrapper.className = `message-wrapper${isMe ? " me" : ""}`;
      if (!animate) wrapper.style.animation = "none";

      const time = data.timestamp?.toDate
        ? data.timestamp.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        : new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });

      wrapper.innerHTML = `
        <img class="avatar-small" src="${data.photo || ''}" alt="${data.name}" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=1a1a1a&color=e8ff3e&size=28'"/>
        <div class="bubble-group">
          ${!isMe ? `<div class="sender-name">${escapeHtml(data.name)}</div>` : ""}
          <div class="bubble">${escapeHtml(data.text)}</div>
          <div class="timestamp">${time}</div>
        </div>
      `;
      document.getElementById("messages").appendChild(wrapper);
    }

    function addSysMsg(text) {
      const el = document.createElement("div");
      el.className = "sys-msg";
      el.textContent = text;
      document.getElementById("messages").appendChild(el);
    }

    function scrollToBottom() {
      const msgs = document.getElementById("messages");
      msgs.scrollTop = msgs.scrollHeight;
    }

    function updateTypingIndicator() {
      const el = document.getElementById("typing-indicator");
      if (typingUsers.size === 0) { el.textContent = ""; return; }
      const names = [...typingUsers].slice(0, 2).join(", ");
      el.textContent = `${names} ${typingUsers.size === 1 ? "is" : "are"} typing...`;
    }

    function escapeHtml(text) {
      return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // ── Send message ──────────────────────────
    async function sendMessage() {
      const input = document.getElementById("msg-input");
      const text = input.value.trim();
      if (!text || !socket?.connected) return;

      input.value = "";

      const payload = {
        uid: currentUser.uid,
        name: currentUser.displayName,
        photo: currentUser.photoURL,
        text,
        timestamp: null
      };

      // Emit over socket (for realtime)
      socket.emit("send_message", payload);

      // Persist to Firestore
      try {
        await addDoc(collection(db, "messages"), { ...payload, timestamp: serverTimestamp() });
      } catch(e) { console.error("Firestore write failed", e); }
    }

    document.getElementById("send-btn").addEventListener("click", sendMessage);

    document.getElementById("msg-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      } else {
        socket?.emit("typing", { uid: currentUser.uid, name: currentUser.displayName });
      }
    });

    document.getElementById("logout-btn").addEventListener("click", () => {
      signOut(auth).then(() => window.location.href = "index.html");
    });
  </script>
</body>
</html>
