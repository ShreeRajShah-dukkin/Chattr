<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHATTR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111;
      --border: #222;
      --accent: #e8ff3e;
      --accent2: #ff4e3a;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,62,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,62,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .noise {
      position: fixed;
      inset: 0;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    .card {
      position: relative;
      width: 420px;
      padding: 56px 48px;
      background: var(--surface);
      border: 1px solid var(--border);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 3px;
      background: var(--accent);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 2.8rem;
      letter-spacing: -2px;
      color: var(--text);
      line-height: 1;
      margin-bottom: 8px;
    }

    .logo span { color: var(--accent); }

    .tagline {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 32px 0;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: 0.05em;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #3dff87;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #google-btn {
      width: 100%;
      padding: 16px 24px;
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.15s ease;
    }

    #google-btn:hover {
      background: #fff;
      transform: translateY(-2px);
    }

    #google-btn:active { transform: translateY(0); }

    #google-btn svg { width: 18px; height: 18px; flex-shrink: 0; }

    #error-msg {
      margin-top: 16px;
      font-size: 0.75rem;
      color: var(--accent2);
      text-align: center;
      min-height: 20px;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="noise"></div>

  <div class="card">
    <div class="logo">CHATTR<span>.</span></div>
    <div class="tagline">Real-time chat — no noise, just signal</div>

    <div class="status-row">
      <div class="dot"></div>
      Server online
    </div>

    <button id="google-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div id="error-msg"></div>

    <div class="divider"></div>
    <div class="footer-note">
      By signing in you agree to be cool.<br>
      Messages are stored in Firestore.
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    // 🔧 REPLACE with your Firebase project config
   const firebaseConfig = {

};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // If already logged in, skip to chat
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "chat.html";
    });

    document.getElementById("google-btn").addEventListener("click", async () => {
      const btn = document.getElementById("google-btn");
      const err = document.getElementById("error-msg");
      btn.textContent = "Signing in...";
      btn.disabled = true;

      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        localStorage.setItem("chatUser", JSON.stringify({
          uid: user.uid,
          name: user.displayName,
          photo: user.photoURL,
          email: user.email
        }));
        window.location.href = "chat.html";
      } catch (e) {
        err.textContent = "Sign-in failed. Please try again.";
        btn.textContent = "Continue with Google";
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
